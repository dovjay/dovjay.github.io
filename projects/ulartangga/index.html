<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" href="style.css" type="text/css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="script.js" type="text/javascript" defer></script>
  <script src="gameplay.js" type="text/javascript" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Ular Tangga</title>
</head>

<body>
  <div id="main-menu">
    <h1>Ini Game Ular Tangga</h1>
    <h2>Silahkan pilih jumlah pemain!</h2>
    <div class="pemain">
      <button id="p1">1</button>
      <button id="p2">2</button>
      <button id="p3">3</button>
      <button id="p4">4</button>
    </div>
    <h4>Created by Dovan Sanjaya</h4>
  </div>
  <div id="the-game">
    <div id="main-board">
      <h1 id="main-title">Ini Ular Tangga</h1>
      <div id="container">
        <div id="dice-video">
          <video id="dice1" width="320" height="176">
            <source src="videos/dice1.mp4" type="video/mp4">
            Your browser does not support HTML5 video.
          </video>
          <video id="dice2" width="320" height="176">
            <source src="videos/dice2.mp4" type="video/mp4">
            Your browser does not support HTML5 video.
          </video>
          <video id="dice3" width="320" height="176">
            <source src="videos/dice3.mp4" type="video/mp4">
            Your browser does not support HTML5 video.
          </video>
          <video id="dice4" width="320" height="176">
            <source src="videos/dice4.mp4" type="video/mp4">
            Your browser does not support HTML5 video.
          </video>
          <video id="dice5" width="320" height="176">
            <source src="videos/dice5.mp4" type="video/mp4">
            Your browser does not support HTML5 video.
          </video>
          <video id="dice6" width="320" height="176">
            <source src="videos/dice6.mp4" type="video/mp4">
            Your browser does not support HTML5 video.
          </video>
        </div>
        <div id="board"></div>
      </div>
    </div>
    <div id="dice">
      <h2 id="instruction">Player 1, Please roll the dice!</h2>
      <button id="dice-button">Roll</button>
      <div id="position-display"></div>
    </div>
  </div>
</body>

</html>
