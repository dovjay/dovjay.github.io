<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" type="text/css" href="style.css">
  <script type="text/javascript" src="script.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDo List</title>
</head>
<body>
  <div id="container">
    <div id="left">
      <h1>ToDo List <i class="fa fa-tasks"></i></h1>
      <h2>How to Use:</h2>
      <p>Please write your task below, then click the pencil button</p>
      <p id="id-01">Click the task if have complete it</p>
      <p id="id-02">Click the <i class="fa fa-trash-o"></i> button to remove a task from a list</p>
      <input type="text" id="input" placeholder="Insert your task here">
      <button id="button"><i class="fa fa-pencil"></i></button>
    </div>
    <div id="right">
      <h3>The List Goes Here </h3>
      <ul id="list">
      </ul>
    </div>
  </div>
</body>
</html>
