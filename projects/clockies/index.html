<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Clockies</title>
  <script type="text/javascript" src="script.js"></script>
  <link type="text/css" rel="stylesheet" href="style.css">
</head>
<body onload="updateClock(); setInterval('updateClock()', 1000)">
  <div>
    <div id="cover">
        <h1>Nokai</h1>
        <p id="clock"></p>
        <div id="navigation">
          <div id="left">
            <button id="continue"> - </button>
            <button id="call">call</button>
          </div>
          <div id="center">
            <button id="l"> < </button>
            <button id="r"> > </button>
          </div>
          <div id="right">
            <button id="back"> - </button>
            <button id="reject">reject</button>
          </div>
        </div>
        <div id="button">
          <button id="1">1</button><button id="2">2</button><button id="3">3</button>
          <button id="4">4</button><button id="5">5</button><button id="6">6</button>
          <button id="7">7</button><button id="8">8</button><button id="9">9</button>
          <button id="left-symbol">*</button><button id="0">0</button><button id="right-symbol">#</button>
        </div>
        <span id="speaker">... ... ...</span>
    </div>
  </div>
</body>
</html>
